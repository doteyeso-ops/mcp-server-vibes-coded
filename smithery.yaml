startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      VIBES_ORIGIN:
        type: string
        description: "Base URL of the Vibes-Coded API (defaults to the production Railway URL that bypasses Cloudflare)."
        default: "https://vibes-coded-production.up.railway.app"
    required: []
  commandFunction: |-
    ({ config }) => ({
      command: 'python',
      args: ['mcp_server.py'],
      env: { VIBES_ORIGIN: config.VIBES_ORIGIN || 'https://vibes-coded-production.up.railway.app' }
    })
build:
  dockerfile: Dockerfile
