name: Publish MCP (OCI + Registry)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.doteyeso-ops/mcp-server-vibes-coded
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Verify published image
        run: |
          set -euo pipefail
          IMG="ghcr.io/${GITHUB_REPOSITORY}:${{ steps.ver.outputs.version }}"
          docker pull "$IMG"
          docker inspect "$IMG" --format '{{index .Config.Labels "io.modelcontextprotocol.server.name"}}' | grep -F 'io.github.doteyeso-ops/mcp-server-vibes-coded'
          docker run --rm "$IMG" python -c "import mcp_server as m; assert len(m.mcp._tool_manager.list_tools())>=5"

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: mcp-server-vibes-coded
        run: |
          set -euo pipefail
          owner_type="$(gh api "/users/${GITHUB_REPOSITORY_OWNER}" --jq .type)"
          if [[ "${owner_type}" == "Organization" ]]; then
            pkg="/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE}"
          else
            pkg="/user/packages/container/${PACKAGE}"
          fi
          echo "Package API path: ${pkg}"
          gh api -H "Accept: application/vnd.github+json" "${pkg}" --jq '{name,visibility,html_url}' || true
          gh api --method PATCH -H "Accept: application/vnd.github+json" \
            "${pkg}/visibility" -f visibility=public
          vis="$(gh api -H "Accept: application/vnd.github+json" "${pkg}" --jq .visibility)"
          echo "visibility=${vis}"
          [[ "${vis}" == "public" ]]

  pypi:
    runs-on: ubuntu-latest
    needs: docker
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    runs-on: ubuntu-latest
    needs: [docker, pypi]
    if: always() && needs.docker.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Sync server.json version + OCI-only if PyPI missing
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from pathlib import Path
          ver = Path("pyproject.toml").read_text()
          import re
          m = re.search(r'version\s*=\s*"([^"]+)"', ver)
          version = m.group(1) if m else "1.0.3"
          p = Path("server.json")
          data = json.loads(p.read_text())
          data["version"] = version
          for pkg in data.get("packages") or []:
              if pkg.get("registryType") == "oci":
                  pkg["identifier"] = f"ghcr.io/doteyeso-ops/mcp-server-vibes-coded:{version}"
              if pkg.get("registryType") == "pypi":
                  pkg["version"] = version
          try:
              urllib.request.urlopen("https://pypi.org/pypi/mcp-server-vibes-coded/json", timeout=15)
              print("PyPI present — keeping both packages")
          except Exception:
              data["packages"] = [pkg for pkg in data["packages"] if pkg.get("registryType") == "oci"]
              print("PyPI missing — OCI only")
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(p.read_text())
          PY
      - name: Login (GitHub OIDC) and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
