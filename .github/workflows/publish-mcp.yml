name: Publish MCP (OCI + Registry)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=1.0.2,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v1.0.2') }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            io.modelcontextprotocol.server.name=io.github.doteyeso-ops/mcp-server-vibes-coded
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Verify published image
        run: |
          set -euo pipefail
          IMG="ghcr.io/${GITHUB_REPOSITORY}:1.0.2"
          docker pull "$IMG"
          docker inspect "$IMG" --format '{{index .Config.Labels "io.modelcontextprotocol.server.name"}}' | grep -F 'io.github.doteyeso-ops/mcp-server-vibes-coded'
          docker run --rm "$IMG" python -c "import mcp_server as m; assert len(m.mcp._tool_manager.list_tools())>=5"

  pypi:
    runs-on: ubuntu-latest
    needs: docker
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    runs-on: ubuntu-latest
    needs: [docker, pypi]
    if: always() && needs.docker.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Prefer OCI-only server.json if PyPI missing
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from pathlib import Path
          p = Path("server.json")
          data = json.loads(p.read_text())
          try:
              urllib.request.urlopen("https://pypi.org/pypi/mcp-server-vibes-coded/json", timeout=15)
              print("PyPI package present — keeping both packages")
          except Exception:
              data["packages"] = [pkg for pkg in data["packages"] if pkg.get("registryType") == "oci"]
              p.write_text(json.dumps(data, indent=2) + "\n")
              print("PyPI missing — publishing OCI package only")
          print(p.read_text())
          PY
      - name: Login (GitHub OIDC) and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
          ./mcp-publisher validate || true
