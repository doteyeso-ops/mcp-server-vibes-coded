name: Make GHCR public

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: Set GHCR package visibility public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: mcp-server-vibes-coded
        run: |
          set -euo pipefail
          owner_type="$(gh api "/users/${GITHUB_REPOSITORY_OWNER}" --jq .type)"
          if [[ "${owner_type}" == "Organization" ]]; then
            pkg="/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE}"
          else
            pkg="/user/packages/container/${PACKAGE}"
          fi
          echo "Using ${pkg}"
          gh api -H "Accept: application/vnd.github+json" "${pkg}" --jq '{name,visibility,html_url}'
          gh api --method PATCH -H "Accept: application/vnd.github+json" \
            "${pkg}/visibility" -f visibility=public
          gh api -H "Accept: application/vnd.github+json" "${pkg}" --jq .visibility
