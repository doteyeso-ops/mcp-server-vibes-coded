name: Make GHCR public

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/ghcr-public.yml"

permissions:
  packages: write
  contents: read

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: Set package visibility public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          PKG="mcp-server-vibes-coded"
          # User-owned package
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/${PKG}/visibility" \
            -d '{"visibility":"public"}' || true)
          echo "user endpoint HTTP $code"
          cat /tmp/out.json || true
          code2=$(curl -sS -o /tmp/out2.json -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/${OWNER}/packages/container/${PKG}/visibility" \
            -d '{"visibility":"public"}' || true)
          echo "users endpoint HTTP $code2"
          cat /tmp/out2.json || true
